<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kontak SMA N 1 Tarakan</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding-top: 70px; /* ruang untuk navbar fixed-top */
      background-color: #f8f9fa;
    }

    .contact-header {
      background: url('sman1.webp') no-repeat center center;
      background-size: cover;
      height: 300px;
      padding-top: 100px; /* beri jarak dari navbar */
      padding-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      position: relative;
      box-sizing: border-box;
    }

    .contact-header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .contact-header h1 {
      position: relative;
      z-index: 2;
      font-weight: 700;
      font-size: 2.8rem;
      margin: 0;
    }

    .contact-card {
      margin-top: 30px; /* beri jarak agar tidak menempel hero */
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      background-color: white;
    }

    .contact-info p {
      margin-bottom: 10px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container">
    <a class="navbar-brand" href="andi jarwo.html">SMA N 1 Tarakan</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="tentang sekolah.html">Tentang Sekolah</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="visi misi.html">Visi </a>
        </li>
         <li class="nav-item">
          <a class="nav-link" href="ini yg misi.html"> Misi</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="kontak.html">Kontak</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


  <!-- Header Hero -->
  <div class="contact-header">
    <h1>Kontak Sekolah</h1>
  </div>

  <!-- Contact Info -->
  <div class="container contact-card">
    <div class="row">
      <div class="col-md-6 contact-info">
        <h3>Informasi Kontak</h3>
        <p><strong>Alamat:</strong> Tarakan, Kalimantan Utara</p>
        <p><strong>Email:</strong> sman1tarakan@email.com</p>
        <p><strong>Telepon:</strong> (0551) 123456</p>
        <p><strong>Website:</strong> www.sman1tarakan.sch.id</p>
      </div>
      <div class="col-md-6">
        <h3>Hubungi Kami</h3>
        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Nama</label>
            <input type="text" class="form-control" id="name" placeholder="Masukkan nama Anda" />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Masukkan email Anda" />
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Pesan</label>
            <textarea
              class="form-control"
              id="message"
              rows="4"
              placeholder="Tulis pesan Anda"
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Kirim</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-primary text-white text-center p-3 mt-5">
    © 2026 SMA Negeri 1 Tarakan
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
